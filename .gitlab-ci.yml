stages:
  - build
  - test
  - docker

build:
  stage: build
  image: node:20
  script:
    - cd backend
    - npm install
  artifacts:
    paths:
      - backend/node_modules/
    expire_in: 1 hour

test:
  stage: test
  image: node:20
  dependencies:
    - build
  script:
    - cd backend
    - npm test

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t flowersgo-api:latest ./backend
